<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Shader Test</title>
<style>*{margin:0}canvas{width:100vw;height:100vh;display:block}#log{position:fixed;top:10px;left:10px;color:lime;font:12px monospace;white-space:pre-wrap;z-index:10;background:rgba(0,0,0,0.7);padding:8px;max-width:90vw;max-height:90vh;overflow:auto}</style>
</head><body>
<div id="log"></div>
<canvas id="c"></canvas>
<script>
const log = document.getElementById('log');
function L(msg){ log.textContent += msg + '\n'; console.log(msg); }

const VERT = `attribute vec2 aPos; void main(){ gl_Position = vec4(aPos,0.,1.); }`;

const FRAG = `
precision highp float;
uniform vec2 uRes;
uniform float uTime;
uniform float uIntensity;

float S(float a, float b, float t){
  float d = b - a;
  // prevent NaN from 0/0: if edges are equal, return a step
  float safe = abs(d) < 1e-7 ? 1e-7 : d;
  float x = clamp((t - a) / safe, 0.0, 1.0);
  return x * x * (3.0 - 2.0 * x);
}

vec3 N13(float p){
  vec3 p3 = fract(vec3(p)*vec3(.1031,.11369,.13787));
  p3 += dot(p3, p3.yzx+19.19);
  return fract(vec3((p3.x+p3.y)*p3.z,(p3.x+p3.z)*p3.y,(p3.y+p3.z)*p3.x));
}
float N(float t){ return fract(sin(t*12345.564)*7658.76); }
float Saw(float b, float t){ return S(0.,b,t)*S(1.,b,t); }

vec2 DropLayer2(vec2 uv, float t){
  vec2 UV=uv;
  uv.y+=t*0.75;
  vec2 a=vec2(6.,1.);
  vec2 grid=a*2.;
  vec2 id=floor(uv*grid);
  float colShift=N(id.x);
  uv.y+=colShift;
  id=floor(uv*grid);
  vec3 n=N13(id.x*35.2+id.y*2376.1);
  vec2 st=fract(uv*grid)-vec2(.5,0);
  float x=n.x-.5;
  float y=UV.y*20.;
  float wiggle=sin(y+sin(y));
  x+=wiggle*(.5-abs(x))*(n.z-.5);
  x*=.7;
  float ti=fract(t+n.z);
  y=(Saw(.85,ti)-.5)*.9+.5;
  vec2 p=vec2(x,y);
  float d=length((st-p)*a.yx);
  float mainDrop=S(.4,.0,d);
  float r=sqrt(S(1.,y,st.y));
  float cd=abs(st.x-x);
  float trail=S(.23*r,.15*r*r,cd);
  float trailFront=S(-.02,.02,st.y-y);
  trail*=trailFront*r*r;
  y=UV.y;
  float trail2=S(.2*r,.0,cd);
  float droplets=max(0.,(sin(y*(1.-y)*120.)-st.y))*trail2*trailFront*n.z;
  y=fract(y*10.)+(st.y-.5);
  float dd=length(st-vec2(x,y));
  droplets=S(.3,0.,dd);
  float m=mainDrop+droplets*r*trailFront;
  return vec2(m,trail);
}

float StaticDrops(vec2 uv, float t){
  uv*=40.;
  vec2 id=floor(uv);
  uv=fract(uv)-.5;
  vec3 n=N13(id.x*107.45+id.y*3543.654);
  vec2 p=(n.xy-.5)*.7;
  float d=length(uv-p);
  float fade=Saw(.025,fract(t+n.z));
  float c=S(.3,0.,d)*fract(n.z*10.)*fade;
  return c;
}

vec2 Drops(vec2 uv, float t, float l0, float l1, float l2){
  float s=StaticDrops(uv,t)*l0;
  vec2 m1=DropLayer2(uv,t)*l1;
  vec2 m2=DropLayer2(uv*1.85,t)*l2;
  float c=s+m1.x+m2.x;
  c=S(.3,1.,c);
  return vec2(c,max(m1.y*l0,m2.y*l1));
}

float hash2(vec2 p){
  vec3 p3=fract(vec3(p.xyx)*vec3(.1031,.1030,.0973));
  p3+=dot(p3,p3.yzx+33.33);
  return fract((p3.x+p3.y)*p3.z);
}

vec3 background(vec2 uv, float blur){
  vec3 col=mix(vec3(0.02,0.03,0.08),vec3(0.06,0.07,0.15),uv.y);
  float spread=1.0+blur*0.15;
  for(int i=0;i<24;i++){
    float fi=float(i);
    vec2 bp=vec2(hash2(vec2(fi*1.17,.31))*2.0-1.0,hash2(vec2(.73,fi*.93))*2.0-1.0)*vec2(1.1,.8);
    bp.y+=0.1;
    float baseSize=0.03+hash2(vec2(fi,fi*.41))*.07;
    float sz=baseSize*spread;
    float br=0.3+hash2(vec2(fi*.51,fi*1.23))*.7;
    float d=length((uv-vec2(.5))*2.0-bp);
    float bokeh=S(sz,sz*0.1,d)*br;
    vec3 tint=vec3(.2,.4,.8);
    float ht=hash2(vec2(fi*2.01,.07));
    if(ht>.7) tint=vec3(.6,.25,.65);
    else if(ht>.4) tint=vec3(.2,.55,.5);
    else if(ht>.2) tint=vec3(.7,.5,.2);
    col+=bokeh*tint*0.18;
  }
  return col;
}

void main(){
  vec2 uv=(gl_FragCoord.xy-.5*uRes.xy)/uRes.y;
  vec2 UV=gl_FragCoord.xy/uRes.xy;
  float T=uTime;
  float t=T*.2;
  float rainAmount=uIntensity;
  float maxBlur=mix(3.,6.,rainAmount);
  float minBlur=2.;
  float sd=S(-.5,1.,rainAmount)*2.;
  float layer1=S(.25,.75,rainAmount);
  float layer2=S(.0,.5,rainAmount);
  vec2 c=Drops(uv,t,sd,layer1,layer2);
  vec2 e=vec2(.001,0.);
  float cx=Drops(uv+e,t,sd,layer1,layer2).x;
  float cy=Drops(uv+e.yx,t,sd,layer1,layer2).x;
  vec2 n=vec2(cx-c.x,cy-c.x);
  float focus=mix(maxBlur-c.y,minBlur,S(.1,.2,c.x));
  vec3 col=background(UV+n,focus);
  col*=vec3(.8,.6,.9);
  vec2 uvV=UV-.5;
  col*=.8-dot(uvV,uvV);
  gl_FragColor=vec4(col,1.);
}
`;

try {
  const canvas = document.getElementById('c');
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;

  const gl = canvas.getContext('webgl', {alpha:false, antialias:false});
  if(!gl){ L('ERROR: No WebGL'); throw 'no gl'; }
  L('WebGL OK: ' + gl.getParameter(gl.VERSION));
  L('Renderer: ' + gl.getParameter(gl.RENDERER));

  gl.viewport(0,0,canvas.width,canvas.height);

  function compile(type, src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
      const err = gl.getShaderInfoLog(s);
      L('COMPILE ERROR:\n' + err);
      return null;
    }
    return s;
  }

  const vs = compile(gl.VERTEX_SHADER, VERT);
  L(vs ? 'Vertex shader OK' : 'Vertex shader FAILED');
  const fs = compile(gl.FRAGMENT_SHADER, FRAG);
  L(fs ? 'Fragment shader OK' : 'Fragment shader FAILED');

  if(!vs || !fs) throw 'shader compile failed';

  const pg = gl.createProgram();
  gl.attachShader(pg, vs);
  gl.attachShader(pg, fs);
  gl.linkProgram(pg);
  if(!gl.getProgramParameter(pg, gl.LINK_STATUS)){
    L('LINK ERROR: ' + gl.getProgramInfoLog(pg));
    throw 'link failed';
  }
  L('Program linked OK');

  const aPos = gl.getAttribLocation(pg, 'aPos');
  const uRes = gl.getUniformLocation(pg, 'uRes');
  const uTime = gl.getUniformLocation(pg, 'uTime');
  const uIntensity = gl.getUniformLocation(pg, 'uIntensity');

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

  const t0 = performance.now()/1000;
  let frame = 0;
  function loop(){
    gl.useProgram(pg);
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, performance.now()/1000 - t0);
    gl.uniform1f(uIntensity, 0.7);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    frame++;
    if(frame === 2) L('Rendering... (2 frames drawn)');
    requestAnimationFrame(loop);
  }
  loop();
  L('Animation started');
} catch(e) {
  L('JS ERROR: ' + e);
}
</script>
</body></html>
